<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sienna 주유 기록</title>
<style>
  :root{
    --bg:#0e1116;
    --panel:#161b22;
    --panel2:#1c232d;
    --line:#262d38;
    --ink:#e8edf2;
    --muted:#8a96a5;
    --accent:#46d6a0;      /* 기준보다 좋음 */
    --warn:#f4a04a;        /* 약간 나쁨 */
    --bad:#ef5a5a;         /* 나쁨 */
    --blue:#5aa0ef;
    --fuel:#f4c84a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  body{padding:16px 14px 60px;max-width:560px;margin:0 auto}

  .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
  .head h1{font-size:19px;font-weight:700;letter-spacing:-.3px}
  .head .car{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
  .modeline{font-size:11px;color:var(--muted);margin-bottom:14px;display:flex;gap:6px;align-items:center}
  .modeline select{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:3px 6px;font-size:11px}

  /* ===== Hero: 연비 게이지 ===== */
  .hero{background:linear-gradient(160deg,#192029,#12171e);border:1px solid var(--line);border-radius:16px;padding:18px 18px 16px;margin-bottom:12px;position:relative;overflow:hidden}
  .hero .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .hero .big{display:flex;align-items:flex-end;gap:8px}
  .hero .mpg{font-size:52px;font-weight:800;line-height:.9;letter-spacing:-1.5px;font-variant-numeric:tabular-nums}
  .hero .mpgunit{font-size:14px;color:var(--muted);margin-bottom:8px}
  .hero .vs{margin-top:10px;font-size:12.5px;color:var(--muted)}
  .hero .vs b{color:var(--ink)}
  .delta-pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700;margin-left:2px}

  .bar{margin-top:14px;height:9px;background:#0c1014;border-radius:6px;position:relative;overflow:visible}
  .bar .fill{height:100%;border-radius:6px;transition:width .5s ease}
  .bar .epa-mark{position:absolute;top:-4px;width:2px;height:17px;background:var(--blue)}
  .bar .epa-lab{position:absolute;top:-20px;font-size:9px;color:var(--blue);transform:translateX(-50%)}

  /* ===== Stat grid ===== */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 14px}
  .card .k{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
  .card .v{font-size:23px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .card .v small{font-size:12px;color:var(--muted);font-weight:500;margin-left:2px}
  .card .sub{font-size:11px;color:var(--muted);margin-top:3px}
  .card.wide{grid-column:1 / -1}
  .up{color:var(--bad)} .down{color:var(--accent)}

  /* ===== Add form ===== */
  .addbtn{width:100%;background:var(--accent);color:#08130d;border:none;border-radius:13px;padding:15px;font-size:16px;font-weight:800;margin-bottom:14px;cursor:pointer}
  .addbtn:active{transform:scale(.99)}
  .form{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;display:none}
  .form.open{display:block}
  .form h3{font-size:14px;margin-bottom:12px}
  .frow{display:flex;gap:10px;margin-bottom:11px}
  .field{flex:1;display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;color:var(--muted)}
  .field input,.field select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:11px 10px;font-size:15px;font-variant-numeric:tabular-nums}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
  .calc{font-size:11px;color:var(--muted);min-height:14px;margin:-4px 0 10px}
  .calc b{color:var(--fuel)}
  .formbtns{display:flex;gap:10px}
  .formbtns button{flex:1;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer}
  .save{background:var(--accent);color:#08130d}
  .cancel{background:var(--panel2);color:var(--muted)}

  /* ===== Log list ===== */
  .seclabel{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:6px 2px 9px}
  .entry{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:9px}
  .entry .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
  .entry .date{font-size:13px;font-weight:600}
  .entry .odo{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:2px}
  .entry .cost{text-align:right}
  .entry .cost .total{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
  .entry .cost .ppg{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
  .entry .metrics{display:flex;gap:14px;border-top:1px solid var(--line);padding-top:8px}
  .entry .m{flex:1}
  .entry .m .ml{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .entry .m .mv{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
  .entry .gal{font-size:11px;color:var(--muted);margin-top:2px}
  .chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
  .entry .del{background:none;border:none;color:#4a5563;font-size:18px;cursor:pointer;padding:0 2px;margin-left:8px}
  .first-note{font-size:11px;color:var(--muted);font-style:italic}

  /* ===== 운전 스타일 진단 ===== */
  .diag{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
  .diag .row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .diag .row:last-child{border-bottom:none}
  .diag .rtype{width:42px;font-size:12px;font-weight:700;color:var(--muted)}
  .diag .track{flex:1;height:7px;background:#0c1014;border-radius:5px;position:relative;overflow:visible}
  .diag .track .epaline{position:absolute;top:-3px;width:2px;height:13px;background:var(--blue);left:50%}
  .diag .track .myfill{position:absolute;top:0;left:0;height:100%;border-radius:5px}
  .diag .rval{width:90px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums}
  .diag .rval b{font-size:14px}
  .diag .rnone{width:90px;text-align:right;font-size:11px;color:#4a5563}
  .diag .verdict{font-size:12.5px;color:var(--ink);margin-top:11px;line-height:1.6;background:var(--panel2);border-radius:9px;padding:10px 12px}
  .diag .verdict span{color:var(--muted)}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 10px;line-height:1.7}
  .reset{display:block;margin:24px auto 0;background:none;border:1px solid var(--line);color:var(--muted);font-size:11px;padding:8px 16px;border-radius:8px;cursor:pointer}
</style>
</head>
<body>

<div class="head">
  <h1>⛽ Sienna 주유 기록</h1>
  <div class="car">2014 · <span id="odoTop">154,256</span> mi</div>
</div>
<div class="modeline">
  EPA 기준:
  <select id="trim">
    <option value="fwd">FWD (복합 21 · 시내 18 · 고속 25)</option>
    <option value="awd">AWD (복합 19 · 시내 16 · 고속 23)</option>
  </select>
</div>

<!-- HERO -->
<div class="hero">
  <div class="label">최근 실제 연비</div>
  <div class="big">
    <div class="mpg" id="heroMpg">—</div>
    <div class="mpgunit">MPG</div>
  </div>
  <div class="vs" id="heroVs">기록을 추가하면 EPA 기준과 비교됩니다.</div>
  <div class="bar" id="heroBar">
    <div class="fill" id="heroFill" style="width:0%"></div>
    <div class="epa-mark" id="epaMark" style="left:0%"></div>
    <div class="epa-lab" id="epaLab" style="left:0%">EPA</div>
  </div>
</div>

<!-- STATS -->
<div class="grid">
  <div class="card">
    <div class="k">마일당 비용</div>
    <div class="v" id="costPerMile">—<small>¢/mi</small></div>
    <div class="sub" id="costPerMileSub">최근 주유 기준</div>
  </div>
  <div class="card">
    <div class="k">평균 연비</div>
    <div class="v" id="avgMpg">—<small>MPG</small></div>
    <div class="sub" id="avgMpgSub">전체 기록 평균</div>
  </div>
  <div class="card">
    <div class="k">누적 주유비</div>
    <div class="v" id="totalSpent">$0</div>
    <div class="sub" id="totalSpentSub">총 0회</div>
  </div>
  <div class="card">
    <div class="k">이번 달 지출</div>
    <div class="v" id="monthSpent">$0</div>
    <div class="sub" id="monthSpentSub">—</div>
  </div>
</div>

<button class="addbtn" id="openForm">＋ 주유 기록 추가</button>

<div class="seclabel">운전 스타일 진단</div>
<div class="diag" id="diag">
  <div class="empty" style="padding:18px 10px">유형별로 2회 이상 주유하면<br>운전 스타일이 분석됩니다.</div>
</div>

<!-- FORM -->
<div class="form" id="form">
  <h3>새 주유 기록</h3>
  <div class="frow">
    <div class="field">
      <label>날짜</label>
      <input type="date" id="fDate">
    </div>
    <div class="field">
      <label>주행거리 (odometer, mi)</label>
      <input type="number" id="fOdo" inputmode="numeric" placeholder="154256">
    </div>
  </div>
  <div class="frow">
    <div class="field">
      <label>주유량 (gallons)</label>
      <input type="number" step="0.001" id="fGal" inputmode="decimal" placeholder="14.2">
    </div>
    <div class="field">
      <label>갤런당 가격 ($/gal)</label>
      <input type="number" step="0.001" id="fPpg" inputmode="decimal" placeholder="3.29">
    </div>
  </div>
  <div class="frow">
    <div class="field">
      <label>총 결제액 ($) <span style="color:#4a5563">— 선택</span></label>
      <input type="number" step="0.01" id="fTotal" inputmode="decimal" placeholder="자동계산">
    </div>
    <div class="field">
      <label>주행 유형</label>
      <select id="fType">
        <option value="mixed">복합 (mixed)</option>
        <option value="city">시내 위주 (city)</option>
        <option value="hwy">고속 위주 (highway)</option>
      </select>
    </div>
  </div>
  <div class="calc" id="calcHint"></div>
  <div class="formbtns">
    <button class="cancel" id="cancelForm">취소</button>
    <button class="save" id="saveEntry">저장</button>
  </div>
</div>

<div class="seclabel">기록</div>
<div id="log"></div>

<button class="reset" id="resetBtn">모든 기록 삭제</button>

<script>
const EPA = {
  fwd:{comb:21,city:18,hwy:25},
  awd:{comb:19,city:16,hwy:23}
};
let entries = [];
let trim = 'fwd';

const $ = id => document.getElementById(id);
const fmtMoney = n => '$' + (n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtMoney0 = n => '$' + Math.round(n).toLocaleString('en-US');

// ---------- storage ----------
async function load(){
  try{
    const r = await window.storage.get('entries');
    if(r && r.value) entries = JSON.parse(r.value);
  }catch(e){ entries = []; }
  try{
    const t = await window.storage.get('trim');
    if(t && t.value){ trim = t.value; $('trim').value = trim; }
  }catch(e){}
  render();
}
async function persist(){
  try{ await window.storage.set('entries', JSON.stringify(entries)); }catch(e){}
}
async function persistTrim(){
  try{ await window.storage.set('trim', trim); }catch(e){}
}

// ---------- compute ----------
// entries sorted oldest->newest by odometer for MPG calc
function computed(){
  const sorted = [...entries].sort((a,b)=> a.odo - b.odo || a.date.localeCompare(b.date));
  return sorted.map((e,i)=>{
    const prev = i>0 ? sorted[i-1] : null;
    let mpg=null, miles=null;
    if(prev){
      miles = e.odo - prev.odo;
      if(miles>0 && e.gal>0) mpg = miles / e.gal;   // gallons of THIS fill burned the miles since last fill
    }
    const total = e.total!=null ? e.total : (e.gal*e.ppg);
    const cpm = (mpg && e.ppg) ? (e.ppg/mpg)*100 : null; // cents per mile
    return {...e, mpg, miles, total, cpm};
  });
}

function epaRef(type){
  const E = EPA[trim];
  if(type==='city') return E.city;
  if(type==='hwy') return E.hwy;
  return E.comb;
}
function deltaColor(pct){
  if(pct >= -2) return 'var(--accent)';
  if(pct >= -12) return 'var(--warn)';
  return 'var(--bad)';
}

// ---------- render ----------
function render(){
  const c = computed();
  const withMpg = c.filter(e=>e.mpg!=null);
  const latest = withMpg.length ? withMpg[withMpg.length-1] : null;

  // hero
  if(latest){
    const ref = epaRef(latest.type);
    const pct = ((latest.mpg-ref)/ref)*100;
    const col = deltaColor(pct);
    $('heroMpg').textContent = latest.mpg.toFixed(1);
    $('heroMpg').style.color = col;
    const sign = pct>=0?'+':'';
    $('heroVs').innerHTML = `EPA ${labelType(latest.type)} <b>${ref} MPG</b> 대비 `+
      `<span class="delta-pill" style="background:${col}22;color:${col}">${sign}${pct.toFixed(0)}%</span>`;
    // bar scale: 0 .. ref*1.4
    const max = ref*1.4;
    $('heroFill').style.width = Math.min(100,(latest.mpg/max)*100)+'%';
    $('heroFill').style.background = col;
    const ep = (ref/max)*100;
    $('epaMark').style.left = ep+'%';
    $('epaLab').style.left = ep+'%';
  }else{
    $('heroMpg').textContent='—';
    $('heroVs').textContent='최소 2회 주유하면 실제 연비가 계산됩니다.';
    $('heroFill').style.width='0%';
  }

  // cost per mile (latest)
  if(latest && latest.cpm!=null){
    $('costPerMile').innerHTML = latest.cpm.toFixed(1)+'<small>¢/mi</small>';
    $('costPerMileSub').textContent = `최근 ${latest.miles} mi · ${fmtMoney(latest.total)}`;
  }

  // avg mpg
  if(withMpg.length){
    const totMiles = withMpg.reduce((s,e)=>s+e.miles,0);
    const totGal = withMpg.reduce((s,e)=>s+e.gal,0);
    const avg = totMiles/totGal;
    $('avgMpg').innerHTML = avg.toFixed(1)+'<small>MPG</small>';
    const ref = EPA[trim].comb;
    const pct = ((avg-ref)/ref)*100;
    $('avgMpgSub').innerHTML = `EPA 복합 대비 <span style="color:${deltaColor(pct)}">${pct>=0?'+':''}${pct.toFixed(0)}%</span>`;
  }

  // total spent
  const totalSpent = c.reduce((s,e)=>s+e.total,0);
  $('totalSpent').textContent = fmtMoney0(totalSpent);
  $('totalSpentSub').textContent = `총 ${c.length}회 주유`;

  // this month
  const now = new Date();
  const ym = now.toISOString().slice(0,7);
  const monthEntries = c.filter(e=>e.date.slice(0,7)===ym);
  const monthSpent = monthEntries.reduce((s,e)=>s+e.total,0);
  $('monthSpent').textContent = fmtMoney0(monthSpent);
  $('monthSpentSub').textContent = `${now.getMonth()+1}월 · ${monthEntries.length}회`;

  // odo top
  if(c.length){
    const maxOdo = Math.max(...c.map(e=>e.odo));
    $('odoTop').textContent = maxOdo.toLocaleString('en-US');
  }

  renderLog(c);
  renderDiag(c);
}

function labelType(t){ return t==='city'?'시내':t==='hwy'?'고속':'복합'; }

function renderDiag(c){
  const diag = $('diag');
  const withMpg = c.filter(e=>e.mpg!=null);
  if(!withMpg.length){
    diag.innerHTML = `<div class="empty" style="padding:18px 10px">유형별로 2회 이상 주유하면<br>운전 스타일이 분석됩니다.</div>`;
    return;
  }
  const types = ['city','mixed','hwy'];
  const stat = {};
  types.forEach(t=>{
    const g = withMpg.filter(e=>e.type===t);
    if(g.length){
      const miles = g.reduce((s,e)=>s+e.miles,0);
      const gal = g.reduce((s,e)=>s+e.gal,0);
      stat[t] = { mpg: miles/gal, n:g.length };
    }
  });

  let rows = types.map(t=>{
    const ref = epaRef(t);
    const s = stat[t];
    if(!s){
      return `<div class="row">
        <div class="rtype">${labelType(t)}</div>
        <div class="track"><div class="epaline"></div></div>
        <div class="rnone">기록 없음</div>
      </div>`;
    }
    const pct = ((s.mpg-ref)/ref)*100;
    const col = deltaColor(pct);
    // bar: EPA at 50%, scale ±40% -> full width
    const rel = Math.max(-40,Math.min(40,pct));
    let left, width;
    if(rel>=0){ left=50; width=(rel/40)*50; }
    else{ width=(-rel/40)*50; left=50-width; }
    return `<div class="row">
      <div class="rtype">${labelType(t)}</div>
      <div class="track">
        <div class="myfill" style="left:${left}%;width:${width}%;background:${col}"></div>
        <div class="epaline"></div>
      </div>
      <div class="rval"><b style="color:${col}">${s.mpg.toFixed(1)}</b> <span style="color:var(--muted)">/ ${ref} <span style="color:${col}">${pct>=0?'+':''}${pct.toFixed(0)}%</span></span></div>
    </div>`;
  }).join('');

  // verdict
  const verdict = buildVerdict(stat);
  diag.innerHTML = rows + `<div class="verdict">${verdict}</div>`;
}

function buildVerdict(stat){
  const parts = [];
  const has = Object.keys(stat).length;
  if(!has) return '';
  ['city','hwy','mixed'].forEach(t=>{
    const s = stat[t];
    if(!s) return;
    const ref = epaRef(t);
    const pct = ((s.mpg-ref)/ref)*100;
    const lab = labelType(t);
    if(pct >= 3) parts.push(`<b style="color:var(--accent)">${lab}</b>는 EPA보다 ${pct.toFixed(0)}% 효율적입니다.`);
    else if(pct >= -8) parts.push(`<b>${lab}</b>는 EPA 기준과 거의 일치합니다 (${pct>=0?'+':''}${pct.toFixed(0)}%).`);
    else parts.push(`<b style="color:var(--warn)">${lab}</b> 운전이 EPA보다 ${Math.abs(pct).toFixed(0)}% 나쁩니다.`);
  });
  // 종합 한줄
  let tip = '';
  const city = stat.city, hwy = stat.hwy;
  if(city && hwy){
    const cPct = ((city.mpg-epaRef('city'))/epaRef('city'))*100;
    const hPct = ((hwy.mpg-epaRef('hwy'))/epaRef('hwy'))*100;
    if(cPct < hPct - 6) tip = ` <span>→ 시내 효율이 약점입니다. 급가속·공회전을 줄이면 개선 여지가 큽니다.</span>`;
    else if(hPct < cPct - 6) tip = ` <span>→ 고속 효율이 약점입니다. 순항 속도(65→70mph)나 적재 무게를 점검해 보세요.</span>`;
  }
  return parts.join(' ') + tip;
}

function renderLog(c){
  const log = $('log');
  if(!c.length){
    log.innerHTML = `<div class="empty">아직 기록이 없습니다.<br>첫 주유를 추가하면<br>다음 주유부터 연비가 계산됩니다.</div>`;
    return;
  }
  const desc = [...c].reverse();
  log.innerHTML = desc.map(e=>{
    const ref = epaRef(e.type);
    let mpgBlock, chip='', firstNote='';
    if(e.mpg!=null){
      const pct = ((e.mpg-ref)/ref)*100;
      const col = deltaColor(pct);
      chip = `<span class="chip" style="background:${col}22;color:${col}">${pct>=0?'+':''}${pct.toFixed(0)}% vs EPA</span>`;
      mpgBlock = `<div class="mv" style="color:${col}">${e.mpg.toFixed(1)}<span style="font-size:11px;color:var(--muted)"> MPG</span></div>`;
    }else{
      mpgBlock = `<div class="mv" style="color:var(--muted)">—</div>`;
      firstNote = `<div class="first-note">기준점 (이전 기록 없음)</div>`;
    }
    const cpm = e.cpm!=null ? e.cpm.toFixed(1)+'¢' : '—';
    const milesTxt = e.miles!=null ? e.miles.toLocaleString('en-US')+' mi' : '';
    return `<div class="entry">
      <div class="top">
        <div>
          <div class="date">${formatDate(e.date)} <span style="font-size:11px;color:var(--muted)">· ${labelType(e.type)}</span></div>
          <div class="odo">${e.odo.toLocaleString('en-US')} mi ${milesTxt?'· +'+milesTxt:''}</div>
        </div>
        <div style="display:flex;align-items:flex-start">
          <div class="cost">
            <div class="total">${fmtMoney(e.total)}</div>
            <div class="ppg">${e.gal.toFixed(1)} gal · $${e.ppg.toFixed(2)}/gal</div>
          </div>
          <button class="del" data-id="${e.id}">×</button>
        </div>
      </div>
      <div class="metrics">
        <div class="m">
          <div class="ml">실연비 ${chip}</div>
          ${mpgBlock}
          ${firstNote}
        </div>
        <div class="m">
          <div class="ml">마일당 비용</div>
          <div class="mv">${cpm}<span style="font-size:11px;color:var(--muted)">/mi</span></div>
        </div>
      </div>
    </div>`;
  }).join('');

  log.querySelectorAll('.del').forEach(b=>{
    b.onclick = async ()=>{
      entries = entries.filter(x=>x.id !== b.dataset.id);
      await persist(); render();
    };
  });
}

function formatDate(d){
  const dt = new Date(d+'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}

// ---------- form ----------
function openForm(){
  $('form').classList.add('open');
  $('openForm').style.display='none';
  if(!$('fDate').value) $('fDate').value = new Date().toISOString().slice(0,10);
  // prefill odo hint with last
  const c = computed();
  if(c.length && !$('fOdo').value){
    $('fOdo').placeholder = (Math.max(...c.map(e=>e.odo))+300)+' (대략)';
  }
  updateCalc();
}
function closeForm(){
  $('form').classList.remove('open');
  $('openForm').style.display='block';
}
function updateCalc(){
  const gal = parseFloat($('fGal').value);
  const ppg = parseFloat($('fPpg').value);
  const tot = parseFloat($('fTotal').value);
  let msg='';
  if(gal>0 && ppg>0){
    msg = `총액 ≈ <b>${fmtMoney(gal*ppg)}</b>`;
  }else if(tot>0 && gal>0){
    msg = `갤런당 ≈ <b>$${(tot/gal).toFixed(2)}</b>`;
  }
  const c = computed();
  const odo = parseFloat($('fOdo').value);
  if(odo>0 && c.length){
    const maxOdo = Math.max(...c.map(e=>e.odo));
    const miles = odo - maxOdo;
    if(miles>0 && gal>0){
      msg += (msg?' · ':'') + `이번 구간 <b>${(miles/gal).toFixed(1)} MPG</b> (${miles} mi)`;
    }
  }
  $('calcHint').innerHTML = msg;
}
['fGal','fPpg','fTotal','fOdo'].forEach(id=> $(id).addEventListener('input',updateCalc));

async function saveEntry(){
  const date = $('fDate').value;
  const odo = parseFloat($('fOdo').value);
  const gal = parseFloat($('fGal').value);
  let ppg = parseFloat($('fPpg').value);
  let total = $('fTotal').value!=='' ? parseFloat($('fTotal').value) : null;
  const type = $('fType').value;

  if(!date || !(odo>0) || !(gal>0)){
    alert('날짜, 주행거리, 주유량은 필수입니다.');
    return;
  }
  if(!(ppg>0) && total>0) ppg = total/gal;
  if(!(ppg>0)){ alert('갤런당 가격 또는 총액 중 하나는 입력해야 합니다.'); return; }
  if(total==null) total = gal*ppg;

  entries.push({ id:Date.now()+''+Math.random().toString(36).slice(2,6),
    date, odo, gal, ppg, total, type });
  await persist();

  // reset form
  $('fOdo').value=''; $('fGal').value=''; $('fPpg').value=''; $('fTotal').value='';
  $('calcHint').innerHTML='';
  closeForm();
  render();
}

// ---------- events ----------
$('openForm').onclick = openForm;
$('cancelForm').onclick = closeForm;
$('saveEntry').onclick = saveEntry;
$('trim').onchange = async (e)=>{ trim = e.target.value; await persistTrim(); render(); };
$('resetBtn').onclick = async ()=>{
  if(confirm('모든 주유 기록을 삭제합니다. 계속할까요?')){
    entries=[]; await persist(); render();
  }
};

load();
</script>
</body>
</html>
